// M4 schema candidate (c) — coarser streaming-chunk granularity.
//
// Production `ChatStreamChunk` emits one chunk per token. The harness drives
// chunk-size hints of 1, 4, and 16 tokens through this candidate to measure
// the wire-bytes / TTFT trade-off (more tokens per chunk → fewer HTTP/2
// frames + grpc trailers, but the first observable token arrives later).

syntax = "proto3";

package vllm_grpc.v1.m4_candidates.chunk_granularity;

message ChatStreamChunk {
  // delta_content concatenates the tokens emitted in this chunk; readers
  // recover per-token deltas via tokens_in_chunk / token_ids if needed.
  string delta_content = 1;
  string finish_reason = 2;
  int32  token_index   = 3;          // index of the *first* token in this chunk
  int32  tokens_in_chunk = 4;        // number of tokens fused into this chunk
  repeated int32 token_ids = 5 [packed = true];
}
