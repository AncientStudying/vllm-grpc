[project]
name = "vllm-grpc-proxy"
version = "0.1.0"
requires-python = ">=3.12"
description = "REST proxy server for vllm-grpc"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "grpcio>=1.65",
    "vllm-grpc-gen",
]

[tool.uv.sources]
vllm-grpc-gen = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vllm_grpc_proxy"]
